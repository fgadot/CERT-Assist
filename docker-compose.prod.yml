services:
  county:
    image: cert-county:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8080"
    environment:
      - ENVIRONMENT=production
      - COUNTY_PIN=Les equipes CERT servent et protegent notre communaute
      - COUNTY_API_TOKEN=cert-api-f3a7b2c9-d8e4-4f1a-b5c6-d3e9f2a8b4c1
    volumes:
      - ./public/county:/app/Public

  team-sapphire:
    image: cert-backend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - ENVIRONMENT=production
      - TEAM_ID=sapphire-point
      - TEAM_NAME=Sapphire Point
      - TEAM_ENDPOINT=https://sapphire.certcommand.org
      - TEAM_PIN=ST2027..!
      - MEMBER_PIN=001789
      - COUNTY_ENDPOINT=http://county:8080
      - COUNTY_API_TOKEN=cert-api-f3a7b2c9-d8e4-4f1a-b5c6-d3e9f2a8b4c1
    volumes:
      - ./data/sapphire:/app/data
      - ./config/sapphire:/app/config
      - ./public/backend:/app/Public
    depends_on:
      - county

  team-glenn:
    image: cert-backend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
