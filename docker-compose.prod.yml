      - TEAM_ENDPOINT=https://glenn.certcommand.org
      - TEAM_PIN=GS2027..!
      - MEMBER_PIN=001789
      - COUNTY_ENDPOINT=http://county:8080
      - COUNTY_API_TOKEN=cert-api-f3a7b2c9-d8e4-4f1a-b5c6-d3e9f2a8b4c1
    volumes:
      - ./data/glenn:/app/data
