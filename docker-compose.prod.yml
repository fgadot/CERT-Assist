services:
  county:
    image: cert-county:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8080"
    environment:
      - ENVIRONMENT=production
      - COUNTY_PIN=CY2027..!

  team-sapphire:
    image: cert-backend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - ENVIRONMENT=production
      - TEAM_ID=sapphire-point
      - TEAM_NAME=Sapphire Point
      - TEAM_ENDPOINT=https://sapphire.certassist.us
      - TEAM_PIN=ST2027..!
      - MEMBER_PIN=001789
      - COUNTY_ENDPOINT=http://county:8080
    volumes:
      - ./data/sapphire:/app/data
      - ./config/sapphire:/app/config
    depends_on:
      - county

  team-glenn:
