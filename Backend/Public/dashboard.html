<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERT Field Board - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(135deg, #007AFF, #0051D5);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        
        h1 { font-size: 32px; margin-bottom: 10px; }
        
        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            flex: 1;
            min-width: 200px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .stat-card.flash {
            animation: flashCard 0.5s ease;
        }
        
        @keyframes flashCard {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); background: #e3f2fd; }
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .stat-card .number {
            font-size: 36px;
            font-weight: 700;
            color: #007AFF;
        }
        
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .panel h2 {
            font-size: 20px;
            margin-bottom: 16px;
            color: #333;
        }
        
        .member-item, .report-item, .task-item {
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #007AFF;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .member-item.available { border-left-color: #34C759; }
        .member-item.assigned { border-left-color: #007AFF; }
        .member-item.unavailable { border-left-color: #8E8E93; }
        .member-item.injured { border-left-color: #FF3B30; }
        .member-item.needshelp { border-left-color: #FF9500; }
        
        .report-item.low { border-left-color: #34C759; }
        .report-item.medium { border-left-color: #FFCC00; }
        .report-item.high { border-left-color: #FF9500; }
        .report-item.lifesafety { border-left-color: #FF3B30; }
        
        .item-header {
            font-weight: 600;
            margin-bottom: 4px;
            color: #333;
        }
        
        .item-meta {
            font-size: 13px;
            color: #666;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 4px;
        }
        
        .badge.available { background: #34C759; color: white; }
        .badge.assigned { background: #007AFF; color: white; }
        .badge.unavailable { background: #8E8E93; color: white; }
        .badge.new { background: #007AFF; color: white; }
        .badge.resolved { background: #34C759; color: white; }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .connection-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #8E8E93;
            margin-right: 8px;
        }
        
        .connection-status.connected {
            background: #34C759;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .last-update {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
        }
        
        /* Sub-Team Styles */
        .team-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: white;
            margin-right: 6px;
            min-width: 60px;
            text-align: center;
        }
        
        .team-badge.red { background: #dc3545; }
        .team-badge.blue { background: #0d6efd; }
        .team-badge.green { background: #198754; }
        .team-badge.yellow { background: #ffc107; color: #333; }
        .team-badge.purple { background: #6f42c1; }
        .team-badge.orange { background: #fd7e14; }
        .team-badge.teal { background: #20c997; }
        .team-badge.pink { background: #d63384; }
        
        .subteam-panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .subteam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #007AFF;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0051D5;
        }
        
        .btn-danger {
            background: #FF3B30;
            color: white;
            font-size: 12px;
            padding: 4px 8px;
        }
        
        .subteam-item {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #007AFF;
        }
        
        .subteam-item h4 {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .member-count {
            background: #007AFF;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            margin-left: 8px;
        }
        
        .member-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        
        .member-pill {
            background: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            border: 1px solid #ddd;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            margin: 0;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }
        
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }
        
        .severity-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .severity-badge.low { background: #d4edda; color: #155724; }
        .severity-badge.medium { background: #fff3cd; color: #856404; }
        .severity-badge.high { background: #f8d7da; color: #721c24; }
        .severity-badge.lifesafety { background: #f5c6cb; color: #721c24; font-weight: 800; }
    </style>
</head>
<body>
    <header>
        <h1>🚨 CERT Field Board</h1>
        <div class="last-update">
            <span class="connection-status" id="connectionStatus"></span>
            <span id="lastUpdate">Connecting...</span>
        </div>
    </header>
    
    <div class="status-bar">
        <div class="stat-card" id="memberCard">
            <h3>Team Members</h3>
            <div class="number" id="memberCount">0</div>
        </div>
        <div class="stat-card" id="reportCard">
            <h3>Active Reports</h3>
            <div class="number" id="reportCount">0</div>
        </div>
        <div class="stat-card" id="taskCard">
            <h3>Open Tasks</h3>
            <div class="number" id="taskCount">0</div>
        </div>
        <div class="stat-card" id="subTeamCard">
            <h3>Sub-Teams</h3>
            <div class="number" id="subTeamCount">0</div>
        </div>
    </div>
    
    <!-- Sub-Team Management Panel -->
    <div class="subteam-panel">
        <div class="subteam-header">
            <h2>🎨 Sub-Teams</h2>
            <button class="btn btn-primary" onclick="openCreateSubTeamModal()">+ Create Sub-Team</button>
        </div>
        <div id="subTeamList">
            <div class="empty-state">No sub-teams created yet</div>
        </div>
    </div>
    
    <div class="content-grid">
        <div class="panel">
            <h2>👥 Team Members</h2>
            <div id="memberList">
                <div class="empty-state">No members checked in yet</div>
            </div>
        </div>
        
        <div class="panel">
            <h2>⚠️ Reports</h2>
            <div id="reportList">
                <div class="empty-state">No reports yet</div>
            </div>
        </div>
        
        <div class="panel">
            <h2>✓ Tasks</h2>
            <div id="taskList">
                <div class="empty-state">No tasks yet</div>
            </div>
        </div>
    </div>
    
    <!-- Create Sub-Team Modal -->
    <div class="modal" id="createSubTeamModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Sub-Team</h2>
                <button class="close-btn" onclick="closeCreateSubTeamModal()">&times;</button>
            </div>
            
            <form id="createSubTeamForm" onsubmit="createSubTeam(event)">
                <div class="form-group">
                    <label>Team Color</label>
                    <select id="teamColor" required>
                        <option value="">Select a color...</option>
                        <option value="Red">🔴 Red Team</option>
                        <option value="Blue">🔵 Blue Team</option>
                        <option value="Green">🟢 Green Team</option>
                        <option value="Yellow">🟡 Yellow Team</option>
                        <option value="Purple">🟣 Purple Team</option>
                        <option value="Orange">🟠 Orange Team</option>
                        <option value="Teal">🔷 Teal Team</option>
                        <option value="Pink">🩷 Pink Team</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Select Members (minimum 2)</label>
                    <div class="checkbox-group" id="memberCheckboxList">
                        <div class="empty-state">No available members</div>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Sub-Team</button>
            </form>
        </div>
    </div>
    
    <script>
        let ws;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        let previousMemberCount = 0;
        let previousReportCount = 0;
        let previousTaskCount = 0;
        let previousSubTeamCount = 0;
        let currentData = null;
        
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            console.log('🔌 Connecting to:', wsUrl);
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('✅ WebSocket connected');
                document.getElementById('connectionStatus').classList.add('connected');
                document.getElementById('lastUpdate').textContent = 'Connected - Real-time updates active';
                reconnectAttempts = 0;
            };
            
            ws.onmessage = (event) => {
                console.log('📨 RAW MESSAGE RECEIVED');
                console.log('Data length:', event.data.length);
                console.log('First 200 chars:', event.data.substring(0, 200));
                
                try {
                    const data = JSON.parse(event.data);
                    console.log('✅ Parsed successfully');
                    console.log('Member count in data:', data.members?.length || 0);
                    console.log('Report count in data:', data.reports?.length || 0);
                    console.log('Task count in data:', data.tasks?.length || 0);
                    
                    updateDashboard(data);
                } catch (error) {
                    console.error('❌ Parse error:', error);
                }
            };
            
            ws.onerror = (error) => {
                console.error('❌ WebSocket error:', error);
                document.getElementById('lastUpdate').textContent = 'Connection error';
            };
            
            ws.onclose = () => {
                console.log('🔌 WebSocket disconnected');
                document.getElementById('connectionStatus').classList.remove('connected');
                document.getElementById('lastUpdate').textContent = 'Disconnected - Reconnecting...';
                
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    setTimeout(connect, 2000);
                }
            };
        }
        
        function flashCard(cardId) {
            const card = document.getElementById(cardId);
            card.classList.add('flash');
            setTimeout(() => card.classList.remove('flash'), 500);
        }
        
        function updateDashboard(data) {
            console.log('🔄 UPDATE DASHBOARD CALLED');
            console.log('Data received:', data);
            
            currentData = data; // Store for modal use
            
            const memberCount = data.members?.length || 0;
            const reportCount = data.reports?.length || 0;
            const taskCount = data.tasks?.length || 0;
            const subTeamCount = data.subTeams?.length || 0;
            
            console.log('Setting memberCount to:', memberCount);
            console.log('Setting reportCount to:', reportCount);
            console.log('Setting taskCount to:', taskCount);
            console.log('Setting subTeamCount to:', subTeamCount);
            
            // Force update with textContent (not innerHTML)
            const memberCountEl = document.getElementById('memberCount');
            const reportCountEl = document.getElementById('reportCount');
            const taskCountEl = document.getElementById('taskCount');
            const subTeamCountEl = document.getElementById('subTeamCount');
            
            console.log('memberCountEl:', memberCountEl);
            console.log('Current text:', memberCountEl.textContent);
            
            memberCountEl.textContent = String(memberCount);
            reportCountEl.textContent = String(reportCount);
            taskCountEl.textContent = String(taskCount);
            if (subTeamCountEl) subTeamCountEl.textContent = String(subTeamCount);
            
            console.log('New text:', memberCountEl.textContent);
            
            // Flash cards if counts changed
            if (memberCount !== previousMemberCount) {
                console.log('💥 Member count changed!', previousMemberCount, '→', memberCount);
                flashCard('memberCard');
                previousMemberCount = memberCount;
            }
            if (reportCount !== previousReportCount) {
                console.log('💥 Report count changed!');
                flashCard('reportCard');
                previousReportCount = reportCount;
            }
            if (taskCount !== previousTaskCount) {
                console.log('💥 Task count changed!');
                flashCard('taskCard');
                previousTaskCount = taskCount;
            }
            if (subTeamCountEl && subTeamCount !== previousSubTeamCount) {
                console.log('💥 Sub-team count changed!');
                flashCard('subTeamCard');
                previousSubTeamCount = subTeamCount;
            }
            
            if (data.incident && data.incident.isActive) {
                document.getElementById('incidentStatus').textContent = data.incident.name;
            }
            
            updateMemberList(data.members || [], data.subTeams || []);
            updateReportList(data.reports || [], data.subTeams || []);
            updateTaskList(data.tasks || [], data.subTeams || []);
            updateSubTeamList(data.subTeams || [], data.members || []);
            
            const now = new Date().toLocaleTimeString();
            document.getElementById('lastUpdate').innerHTML = 
                `<span class="connection-status connected"></span>Updated: ${now}`;
            
            console.log('✅ Dashboard update complete');
        }
        
        function updateMemberList(members, subTeams) {
            console.log('Updating member list with', members.length, 'members');
            const container = document.getElementById('memberList');
            
            if (members.length === 0) {
                container.innerHTML = '<div class="empty-state">No members checked in yet</div>';
                return;
            }
            
            const html = members.map(member => {
                const subTeam = subTeams ? subTeams.find(st => st.id === member.subTeamID) : null;
                const teamBadge = subTeam ? 
                    `<span class="team-badge ${subTeam.color.toLowerCase()}">${subTeam.color}</span>` : '';
                
                return `
                <div class="member-item ${member.status.toLowerCase().replace(' ', '')}">
                    <div class="item-header">
                        ${teamBadge}${member.name}
                    </div>
                    <div class="item-meta">
                        <span class="badge ${member.status.toLowerCase().replace(' ', '')}">${member.status}</span>
                        ${member.role}
                    </div>
                </div>
            `;
            }).join('');
            
            container.innerHTML = html;
            console.log('Member list HTML updated');
        }
        
        function updateReportList(reports, subTeams) {
            const container = document.getElementById('reportList');
            
            if (reports.length === 0) {
                container.innerHTML = '<div class="empty-state">No reports yet</div>';
                return;
            }
            
            container.innerHTML = reports.map(report => {
                const subTeam = subTeams ? subTeams.find(st => st.id === report.subTeamID) : null;
                const teamBadge = subTeam ? 
                    `<span class="team-badge ${subTeam.color.toLowerCase()}">${subTeam.color}</span>` : '';
                
                return `
                <div class="report-item ${report.severity.toLowerCase().replace(' ', '')}">
                    <div class="item-header">
                        ${teamBadge}${report.type}
                    </div>
                    <div class="item-meta">
                        <span class="badge ${report.status.toLowerCase()}">${report.status}</span>
                        <span class="severity-badge ${report.severity.toLowerCase().replace(' ', '')}">${report.severity}</span>
                    </div>
                </div>
            `;
            }).join('');
        }
        
        function updateTaskList(tasks, subTeams) {
            const container = document.getElementById('taskList');
            
            if (tasks.length === 0) {
                container.innerHTML = '<div class="empty-state">No tasks yet</div>';
                return;
            }
            
            container.innerHTML = tasks.map(task => {
                const subTeam = subTeams ? subTeams.find(st => st.id === task.assignedSubTeamID) : null;
                const teamBadge = subTeam ? 
                    `<span class="team-badge ${subTeam.color.toLowerCase()}">${subTeam.color}</span>` : '';
                
                return `
                <div class="task-item">
                    <div class="item-header">
                        ${teamBadge}${task.title}
                    </div>
                    <div class="item-meta">
                        <span class="badge ${task.status.toLowerCase()}">${task.status}</span>
                        ${task.priority}
                    </div>
                </div>
            `;
            }).join('');
        }
        
        // Sub-Team Management Functions
        function updateSubTeamList(subTeams, members) {
            const container = document.getElementById('subTeamList');
            
            if (!subTeams || subTeams.length === 0) {
                container.innerHTML = '<div class="empty-state">No sub-teams created yet</div>';
                return;
            }
            
            container.innerHTML = subTeams.map(subTeam => {
                const teamMembers = members.filter(m => m.subTeamID === subTeam.id);
                const memberNames = teamMembers.map(m => m.name);
                
                return `
                <div class="subteam-item" style="border-left-color: ${getColorHex(subTeam.color)}">
                    <h4>
                        <div>
                            <span class="team-badge ${subTeam.color.toLowerCase()}">${subTeam.color} Team</span>
                            <span class="member-count">${teamMembers.length}</span>
                        </div>
                        <button class="btn btn-danger" onclick="deleteSubTeam('${subTeam.id}')">Delete</button>
                    </h4>
                    <div class="member-pills">
                        ${memberNames.map(name => `<span class="member-pill">${name}</span>`).join('')}
                    </div>
                </div>
            `;
            }).join('');
        }
        
        function getColorHex(colorName) {
            const colors = {
                'Red': '#dc3545',
                'Blue': '#0d6efd',
                'Green': '#198754',
                'Yellow': '#ffc107',
                'Purple': '#6f42c1',
                'Orange': '#fd7e14',
                'Teal': '#20c997',
                'Pink': '#d63384'
            };
            return colors[colorName] || '#007AFF';
        }
        
        function openCreateSubTeamModal() {
            if (!currentData || !currentData.members) {
                alert('No members available. Please wait for data to load.');
                return;
            }
            
            // Get members who are available OR already assigned (can be reassigned)
            // Exclude only those who are Unavailable, Injured, or Needs Help
            const eligibleMembers = currentData.members.filter(m => {
                const status = m.status.toLowerCase();
                return status === 'available' || status === 'assigned';
            });
            
            const checkboxList = document.getElementById('memberCheckboxList');
            
            if (eligibleMembers.length < 2) {
                checkboxList.innerHTML = '<div class="empty-state">Not enough members (need at least 2)</div>';
            } else {
                checkboxList.innerHTML = eligibleMembers.map(member => {
                    const currentTeam = currentData.subTeams.find(st => st.id === member.subTeamID);
                    const teamLabel = currentTeam ? ` - Currently on ${currentTeam.color} Team` : '';
                    const style = currentTeam ? 'style="color: #666; font-style: italic;"' : '';
                    
                    return `
                        <div class="checkbox-item">
                            <input type="checkbox" id="member_${member.id}" value="${member.id}">
                            <label for="member_${member.id}" ${style}>${member.name} - ${member.role}${teamLabel}</label>
                        </div>
                    `;
                }).join('');
            }
            
            document.getElementById('createSubTeamModal').classList.add('show');
        }
        
        function closeCreateSubTeamModal() {
            document.getElementById('createSubTeamModal').classList.remove('show');
            document.getElementById('createSubTeamForm').reset();
        }
        
        async function createSubTeam(event) {
            event.preventDefault();
            
            const color = document.getElementById('teamColor').value;
            const checkboxes = document.querySelectorAll('#memberCheckboxList input[type="checkbox"]:checked');
            const memberIDs = Array.from(checkboxes).map(cb => cb.value);
            
            if (memberIDs.length < 2) {
                alert('Please select at least 2 members for the sub-team');
                return;
            }
            
            const subTeam = {
                color: color,
                memberIDs: memberIDs
                // Don't send createdAt or lastUpdated - let backend set them
            };
            
            console.log('Creating sub-team:', subTeam);
            
            try {
                const response = await fetch('/api/subteams', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(subTeam)
                });
                
                console.log('Response status:', response.status);
                const responseText = await response.text();
                console.log('Response body:', responseText);
                
                if (response.ok) {
                    console.log('✅ Sub-team created successfully');
                    closeCreateSubTeamModal();
                } else {
                    console.error('❌ Failed to create sub-team:', responseText);
                    alert('Failed to create sub-team: ' + responseText);
                }
            } catch (error) {
                console.error('❌ Error creating sub-team:', error);
                alert('Error creating sub-team: ' + error.message);
            }
        }
        
        async function deleteSubTeam(id) {
            if (!confirm('Are you sure you want to delete this sub-team? Members will be unassigned.')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/subteams/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    console.log('✅ Sub-team deleted successfully');
                } else {
                    console.error('❌ Failed to delete sub-team');
                    alert('Failed to delete sub-team');
                }
            } catch (error) {
                console.error('❌ Error deleting sub-team:', error);
                alert('Error deleting sub-team');
            }
        }
        
        // Start connection on page load
        console.log('🚀 Starting connection...');
        connect();
        
        // Also expose updateDashboard globally for debugging
        window.updateDashboard = updateDashboard;
        window.testUpdate = () => {
            console.log('🧪 TEST UPDATE CALLED');
            updateDashboard({
                members: [{name: "Test Person " + Date.now(), role: "Test", status: "Available"}],
                reports: [],
                tasks: [],
                lastUpdate: new Date().toISOString()
            });
        };
        console.log('💡 Debug: Type testUpdate() in console to test rendering');
    </script>
