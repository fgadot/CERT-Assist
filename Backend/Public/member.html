<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CERT Member</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f2f2f7;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        header {
            background: #c0392b;
            color: white;
            padding: 18px 20px 14px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 { font-size: 20px; font-weight: 700; }
        header p  { font-size: 13px; opacity: 0.85; margin-top: 2px; }

        .screen { display: none; }
        .screen.active { display: block; }

        /* ── Cards ──────────────────────────────────────────────── */
        .card {
            background: white;
            border-radius: 12px;
            margin: 14px 16px 0;
            overflow: hidden;
        }
        .card-title {
            font-size: 12px;
            font-weight: 600;
            color: #8E8E93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 16px 4px;
        }
        .field {
            padding: 12px 16px;
            border-bottom: 1px solid #f2f2f7;
            display: flex;
            align-items: center;
        }
        .field:last-child { border-bottom: none; }
        .field input,
        .field select,
        .field textarea {
            flex: 1;
            font-size: 17px;
            border: none;
            outline: none;
            background: transparent;
            font-family: inherit;
            color: #1c1c1e;
            min-width: 0;
        }
        .field textarea { resize: none; min-height: 80px; }
        .field select   { -webkit-appearance: none; appearance: none; }

        /* ── Buttons ────────────────────────────────────────────── */
        .btn {
            display: block;
            width: calc(100% - 32px);
            margin: 14px 16px 0;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            font-family: inherit;
        }
        .btn-primary   { background: #007AFF; color: white; }
        .btn-report    { background: #34C759; color: white; font-size: 20px; padding: 20px; }
        .btn-danger    { background: #FF3B30; color: white; }
        .btn-secondary { background: #e5e5ea; color: #3a3a3c; }

        /* ── Equipment grid ─────────────────────────────────────── */
        .equip-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 10px 16px 14px;
        }
        .equip-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f2f2f7;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }
        .equip-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #007AFF;
            flex-shrink: 0;
        }

        /* ── Home screen ────────────────────────────────────────── */
        .member-card {
            background: white;
            border-radius: 12px;
            margin: 14px 16px 0;
            padding: 18px;
        }
        .member-name { font-size: 26px; font-weight: 700; color: #1c1c1e; }
        .member-role { font-size: 15px; color: #8E8E93; margin-top: 2px; }

        .team-badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            color: white;
            margin-top: 12px;
        }
        .team-badge.red    { background: #dc3545; }
        .team-badge.blue   { background: #0d6efd; }
        .team-badge.green  { background: #198754; }
        .team-badge.yellow { background: #ffc107; color: #333; }
        .team-badge.purple { background: #6f42c1; }
        .team-badge.orange { background: #fd7e14; }
        .team-badge.teal   { background: #20c997; }
        .team-badge.pink   { background: #d63384; }
        .team-badge.none   { background: #8E8E93; }

        .task-box {
            border: 1.5px solid #fcd34d;
            border-radius: 10px;
            padding: 12px 14px;
            margin-top: 10px;
            background: #fffbeb;
        }
        .task-box + .task-box { margin-top: 10px; }
        .task-box.p-critical { border-color: #FF3B30; background: #fff5f5; }
        .task-box.p-high     { border-color: #FF9500; background: #fff9f0; }
        .task-box.p-medium   { border-color: #fcd34d; background: #fffbeb; }
        .task-box.p-low      { border-color: #34C759; background: #f0fff5; }

        .task-priority-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }
        .task-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 3px; }
        .task-label.p-critical { color: #FF3B30; }
        .task-label.p-high     { color: #c05a00; }
        .task-label.p-medium   { color: #92400e; }
        .task-label.p-low      { color: #166534; }

        .tasks-count-header {
            font-size: 11px; font-weight: 700; color: #8E8E93;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin: 14px 0 4px;
        }
        .task-title { font-size: 16px; font-weight: 600; color: #1c1c1e; }
        .task-desc  { font-size: 13px; color: #555; margin-top: 4px; }
        .standby    { font-size: 14px; color: #8E8E93; margin-top: 12px; font-style: italic; }

        .task-notes-log {
            margin-top: 10px;
            background: #f9f4e4;
            border-radius: 7px;
            padding: 8px 10px;
            max-height: 110px;
            overflow-y: auto;
            font-size: 12px;
            color: #5a4a1a;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .task-comment-row {
            display: flex;
            gap: 7px;
            margin-top: 9px;
            align-items: flex-end;
        }
        .task-comment-input {
            flex: 1;
            font-size: 14px;
            border: 1px solid #e0c84a;
            border-radius: 8px;
            padding: 8px 10px;
            background: white;
            outline: none;
            font-family: inherit;
            resize: none;
            min-height: 36px;
            max-height: 80px;
        }
        .task-comment-btn {
            flex-shrink: 0;
            background: #92400e;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }
        .task-complete-btn {
            display: block;
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            background: #34C759;
            color: white;
            border: none;
            border-radius: 9px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            text-align: center;
        }
        .task-complete-btn:active { opacity: 0.8; }

        .session-note {
            font-size: 13px;
            color: #8E8E93;
            text-align: center;
            margin: 14px 16px 0;
        }

        /* ── Severity buttons ───────────────────────────────────── */
        .sev-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 10px 16px 14px;
        }
        .sev-btn {
            padding: 14px 8px;
            border: 2px solid;
            border-radius: 10px;
            background: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            font-family: inherit;
            transition: all 0.15s;
        }
        .sev-btn.low  { border-color: #34C759; color: #34C759; }
        .sev-btn.med  { border-color: #fbbf24; color: #92400e; }
        .sev-btn.high { border-color: #FF9500; color: #FF9500; }
        .sev-btn.crit { border-color: #FF3B30; color: #FF3B30; }
        .sev-btn.low.sel  { background: #34C759; color: white; }
        .sev-btn.med.sel  { background: #fbbf24; color: #333; }
        .sev-btn.high.sel { background: #FF9500; color: white; }
        .sev-btn.crit.sel { background: #FF3B30; color: white; }

        /* ── Status grid ────────────────────────────────────────── */
        .status-btn {
            padding: 13px 4px;
            border: 2px solid;
            border-radius: 10px;
            background: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            font-family: inherit;
            transition: background 0.15s, color 0.15s;
        }
        .status-btn[data-status="On Task"]     { border-color: #007AFF; color: #007AFF; }
        .status-btn[data-status="Unavailable"] { border-color: #8E8E93; color: #8E8E93; }
        .status-btn[data-status="Need Help"]   { border-color: #FF9500; color: #FF9500; }
        .status-btn[data-status="Injured"]     { border-color: #FF3B30; color: #FF3B30; }
        .status-btn[data-status="On Task"].active     { background: #007AFF; color: white; }
        .status-btn[data-status="Unavailable"].active { background: #8E8E93; color: white; }
        .status-btn[data-status="Need Help"].active   { background: #FF9500; color: white; }
        .status-btn[data-status="Injured"].active     { background: #FF3B30; color: white; }

        /* ── Toast ──────────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(28,28,30,0.92);
            color: white;
            padding: 12px 24px;
            border-radius: 22px;
            font-size: 15px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.25s;
            z-index: 9999;
            white-space: nowrap;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }

        /* ── Name edit ──────────────────────────────────────────── */
        .name-display-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2px;
        }
        .edit-name-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.45;
            padding: 0;
            line-height: 1;
            flex-shrink: 0;
        }
        .edit-name-btn:active { opacity: 1; }
        .name-edit-row { display: none; margin-bottom: 6px; }
        .name-edit-input {
            width: 100%;
            font-size: 24px;
            font-weight: 700;
            border: none;
            border-bottom: 2px solid #007AFF;
            background: transparent;
            outline: none;
            font-family: inherit;
            color: #1c1c1e;
            padding-bottom: 4px;
        }

        /* ── My Reports ─────────────────────────────────────────── */
        .my-reports-title {
            font-size: 11px;
            font-weight: 700;
            color: #8E8E93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 14px;
            margin-bottom: 8px;
        }
        .report-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            background: #f2f2f7;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 6px;
        }
        .report-row-title { font-size: 14px; font-weight: 600; color: #1c1c1e; }
        .report-row-addr  { font-size: 12px; color: #8E8E93; margin-top: 2px; }
        .report-row-status { font-size: 12px; font-weight: 600; white-space: nowrap; padding-top: 2px; }
        .status-waiting      { color: #8E8E93; }
        .status-acknowledged { color: #FF9500; }
        .status-resolved     { color: #34C759; }
        .status-escalated    { color: #FF3B30; }
    </style>
</head>
<body>

<header>
    <h1>🚨 CERT Field Board</h1>
    <p id="teamNameLabel" style="font-size:13px;font-weight:600;opacity:0.9;margin-top:1px;display:none;"></p>
    <p id="headerSub">Member Portal</p>
</header>

<!-- ═══════════════════════════════════════════════════════════
     SCREEN 1 — CHECK-IN
═══════════════════════════════════════════════════════════ -->
<div id="checkinScreen" class="screen active">

    <div class="card" style="margin-top:20px;">
        <div class="card-title">Your Name</div>
        <div class="field">
            <input id="ciName" type="text" placeholder="First Last"
                   autocomplete="name" autocorrect="off" spellcheck="false">
        </div>
    </div>

    <div class="card">
        <div class="card-title">Role</div>
        <div class="field">
            <select id="ciRole">
                <option value="CERT Member">CERT Member</option>
                <option value="Team Leader">Team Leader</option>
                <option value="Operations - Medical/Triage">Medical / Triage</option>
                <option value="Operations - Search &amp; Rescue">Search &amp; Rescue</option>
                <option value="Operations - Damage Assessment">Damage Assessment</option>
                <option value="Operations - Fire Suppression">Fire Suppression</option>
                <option value="Logistics - Communications">Communications</option>
                <option value="Logistics - Supplies">Supplies / Logistics</option>
                <option value="Planning - Documentation">Documentation</option>
            </select>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Member Access PIN</div>
        <div class="field">
            <input id="ciPin" type="password" placeholder="Enter member PIN (from your team leader)"
                   autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
    </div>

    <div class="card">
        <div class="card-title">Equipment I Have</div>
        <div class="equip-grid">
            <label class="equip-item"><input type="checkbox" value="Radio"> Radio</label>
            <label class="equip-item"><input type="checkbox" value="First Aid Kit"> First Aid Kit</label>
            <label class="equip-item"><input type="checkbox" value="AED"> AED</label>
            <label class="equip-item"><input type="checkbox" value="Chainsaw"> Chainsaw</label>
            <label class="equip-item"><input type="checkbox" value="Generator"> Generator</label>
            <label class="equip-item"><input type="checkbox" value="Vehicle"> Vehicle</label>
            <label class="equip-item"><input type="checkbox" value="Golf Cart"> Golf Cart</label>
            <label class="equip-item"><input type="checkbox" value="Fire Extinguisher"> Fire Ext.</label>
            <label class="equip-item"><input type="checkbox" value="SAR Gear"> SAR Gear</label>
        </div>
    </div>

    <button class="btn btn-primary" onclick="checkIn()" style="margin-top:20px;">Check In</button>

</div>

<!-- ═══════════════════════════════════════════════════════════
     SCREEN 2 — HOME
═══════════════════════════════════════════════════════════ -->
<div id="homeScreen" class="screen">

    <div class="member-card">
        <div class="name-display-row" id="nameDisplayRow">
            <span class="member-name" id="homeNameText">—</span>
            <button class="edit-name-btn" onclick="editNameMode()">✏️</button>
        </div>
        <div class="name-edit-row" id="nameEditRow">
            <input type="text" id="nameEditInput" class="name-edit-input"
                   autocomplete="name" autocorrect="off" spellcheck="false"
                   onkeydown="if(event.key==='Enter')saveName()">
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button class="btn btn-primary"   style="flex:1;padding:10px;font-size:15px;margin:0;" onclick="saveName()">Save</button>
                <button class="btn btn-secondary" style="flex:1;padding:10px;font-size:15px;margin:0;" onclick="cancelNameEdit()">Cancel</button>
            </div>
        </div>
        <div class="member-role" id="homeRole">—</div>
        <div id="homeTeam"></div>
        <div id="homeTask"></div>
        <div id="homeReports"></div>
    </div>

    <div class="card" style="margin-top:14px;">
        <div class="card-title">My Status</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 16px 14px;">
            <button class="status-btn" data-status="On Task"     onclick="confirmStatus('On Task')">On Task</button>
            <button class="status-btn" data-status="Unavailable" onclick="confirmStatus('Unavailable')">Unavailable</button>
            <button class="status-btn" data-status="Need Help"   onclick="confirmStatus('Need Help')">Need Help</button>
            <button class="status-btn" data-status="Injured"     onclick="confirmStatus('Injured')">Injured</button>
        </div>
    </div>

    <button class="btn btn-report" onclick="showReport()">+ Submit Report</button>

    <p class="session-note" id="sessionNote"></p>

    <button class="btn btn-secondary" onclick="checkOut()" style="margin-top:20px;">Check Out</button>

</div>

<!-- ═══════════════════════════════════════════════════════════
     SCREEN 3 — SUBMIT REPORT
═══════════════════════════════════════════════════════════ -->
<div id="reportScreen" class="screen">

    <div class="card" style="margin-top:20px;">
        <div class="card-title">Incident Type</div>
        <div class="field">
            <select id="rType">
                <option value="Tree Down">Tree Down</option>
                <option value="Flooding">Flooding</option>
                <option value="Power Line Down">Power Line Down</option>
                <option value="Medical Need">Medical Need</option>
                <option value="Blocked Road">Blocked Road</option>
                <option value="Fire/Smoke">Fire/Smoke</option>
                <option value="Gas Smell">Gas Smell</option>
                <option value="Welfare Check">Welfare Check</option>
                <option value="Structure Damage">Structure Damage</option>
                <option value="Needs 911">Needs 911</option>
                <option value="Other">Other</option>
            </select>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Subject</div>
        <div class="field">
            <input id="rSubject" type="text"
                   placeholder="e.g. Tree blocking Oak St at Main Ave"
                   autocorrect="off">
        </div>
    </div>

    <div class="card">
        <div class="card-title">Severity</div>
        <div class="sev-grid">
            <button class="sev-btn low"  id="sLow"  onclick="setSev('Low')">Low</button>
            <button class="sev-btn med"  id="sMed"  onclick="setSev('Medium')">Medium</button>
            <button class="sev-btn high" id="sHigh" onclick="setSev('High')">High</button>
            <button class="sev-btn crit" id="sCrit" onclick="setSev('Life Safety')">Life Safety</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Location / Address</div>
        <div class="field">
            <input id="rAddress" type="text"
                   placeholder="e.g. 123 Oak St, near the park entrance"
                   autocorrect="off">
        </div>
    </div>

    <div class="card">
        <div class="card-title">Notes</div>
        <div class="field">
            <textarea id="rNotes"
                placeholder="What do you see? Number of people, hazards, immediate needs..."></textarea>
        </div>
    </div>

    <button class="btn btn-danger" onclick="submitReport()" style="margin-top:20px;">Submit Report</button>
    <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Cancel</button>

</div>

<div class="toast" id="toast"></div>

<script>
    // ── State ──────────────────────────────────────────────────────────────────
    let memberID     = localStorage.getItem('cert_mid');
    let memberName   = localStorage.getItem('cert_mname');
    let memberRole   = localStorage.getItem('cert_mrole');
    let currentStatus = localStorage.getItem('cert_mstatus') || 'Available';
    const PRIORITY_ORDER = { Critical: 0, High: 1, Medium: 2, Low: 3 };
    let reportCount = parseInt(localStorage.getItem('cert_rcount') || '0');
    let severity = 'Medium';
    let gps = null;
    let refreshTimer = null;

    // ── Boot ───────────────────────────────────────────────────────────────────
    (async () => {
        try {
            const res = await fetch('/api/config');
            if (res.ok) {
                const cfg = await res.json();
                if (cfg.team_name) {
                    const lbl = document.getElementById('teamNameLabel');
                    if (lbl) { lbl.textContent = cfg.team_name; lbl.style.display = 'block'; }
                    document.title = `${cfg.team_name} — Member Portal`;
                }
            }
        } catch {}
    })();

    if (memberID && memberName) {
        populateHome();
        showScreen('homeScreen');
        updateStatusButtons();
        scheduleRefresh();
    }

    // ── Screen helpers ─────────────────────────────────────────────────────────
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function populateHome() {
        document.getElementById('homeNameText').textContent = memberName;
        document.getElementById('homeRole').textContent = memberRole;
        document.getElementById('headerSub').textContent = 'Checked In ✓';
        updateSessionNote();
    }

    function showReport() {
        severity = 'Medium';
        renderSev();
        document.getElementById('rSubject').value = '';
        document.getElementById('rNotes').value = '';
        document.getElementById('rAddress').value = '';
        gps = null;
        tryGPS();
        showScreen('reportScreen');
    }

    // ── Check-In ───────────────────────────────────────────────────────────────
    async function checkIn() {
        const name = document.getElementById('ciName').value.trim();
        if (!name) { toast('Please enter your name'); return; }

        const role = document.getElementById('ciRole').value;
        const pin  = document.getElementById('ciPin').value;
        const equip = [...document.querySelectorAll('.equip-grid input:checked')].map(c => c.value);
        const now = isoNow();

        localStorage.setItem('cert_team_pin', pin);

        try {
            const res = await api('POST', '/api/checkin', {
                name, role,
                status: 'Available',
                equipment: equip,
                last_updated: now
            });

            // HTTP response is snake_case (global Content encoder)
            memberID   = res.member_id ?? res.memberID;
            memberName = name;
            memberRole = role;
            reportCount = 0;

            localStorage.setItem('cert_mid',    memberID);
            localStorage.setItem('cert_mname',  memberName);
            localStorage.setItem('cert_mrole',  memberRole);
            localStorage.setItem('cert_rcount', '0');

            populateHome();
            showScreen('homeScreen');
            toast('Checked in!');
            scheduleRefresh();
        } catch (e) {
            toast(e.status === 401 ? 'Incorrect PIN — ask your team leader' : 'Cannot reach server — check WiFi');
        }
    }

    // ── Status ─────────────────────────────────────────────────────────────────
    function updateStatusButtons() {
        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.status === currentStatus);
        });
    }

    function confirmStatus(status) {
        const isActive = currentStatus === status;
        const action = isActive ? 'Disable' : 'Enable';
        if (!confirm(`${action} ${status.toUpperCase()} status?`)) return;
        setStatus(isActive ? 'Available' : status);
    }

    async function setStatus(status) {
        if (!memberID) return;
        try {
            await api('PATCH', `/api/members/${memberID}/status`, { status });
            currentStatus = status;
            localStorage.setItem('cert_mstatus', status);
            updateStatusButtons();
            toast('Status updated ✓');
        } catch(e) {
            toast(e.status === 401 ? 'Incorrect PIN' : 'Failed to update status');
        }
    }

    function checkOut() {
        if (!confirm('End your session and check out?')) return;
        clearTimeout(refreshTimer);
        if (memberID) {
            api('PATCH', `/api/members/${memberID}/status`, { status: 'Unavailable' }).catch(() => {});
        }
        localStorage.removeItem('cert_mid');
        localStorage.removeItem('cert_mname');
        localStorage.removeItem('cert_mrole');
        localStorage.removeItem('cert_rcount');
        localStorage.removeItem('cert_mstatus');
        memberID = memberName = memberRole = null;
        reportCount = 0;
        document.getElementById('ciName').value = '';
        document.getElementById('headerSub').textContent = 'Member Portal';
        document.getElementById('homeTeam').innerHTML = '';
        document.getElementById('homeTask').innerHTML = '';
        document.getElementById('homeReports').innerHTML = '';
        cancelNameEdit();
        showScreen('checkinScreen');
    }

    // ── Assignment refresh ─────────────────────────────────────────────────────
    // /api/dashboard is HTTP → response is snake_case
    async function refreshAssignment() {
        try {
            const d = await api('GET', '/api/dashboard');

            const me = (d.members || []).find(m =>
                m.id && memberID && m.id.toLowerCase() === memberID.toLowerCase()
            );

            const teamEl = document.getElementById('homeTeam');
            const taskEl = document.getElementById('homeTask');

            if (!me) {
                console.warn('[member] refreshAssignment: member not found. memberID=', memberID,
                    'members=', (d.members || []).map(m => m.id));
                // Don't update team/task section, but still fall through to render reports
            } else {
                if (me.status && me.status !== currentStatus) {
                    currentStatus = me.status;
                    localStorage.setItem('cert_mstatus', me.status);
                    updateStatusButtons();
                }
                const teamID = me.sub_team_id;
                if (teamID) {
                    const team = (d.sub_teams || []).find(t =>
                        t.id && t.id.toLowerCase() === teamID.toLowerCase()
                    );
                    if (team) {
                        teamEl.innerHTML =
                            `<span class="team-badge ${team.color.toLowerCase()}">${team.color} Team</span>`;

                        const teamIdLower = team.id.toLowerCase();
                        const teamTasks = (d.tasks || [])
                            .filter(t =>
                                t.assigned_sub_team_id &&
                                t.assigned_sub_team_id.toLowerCase() === teamIdLower &&
                                t.status !== 'Completed' && t.status !== 'Cancelled'
                            )
                            .sort((a, b) => {
                                const pa = PRIORITY_ORDER[a.priority] ?? 4;
                                const pb = PRIORITY_ORDER[b.priority] ?? 4;
                                if (pa !== pb) return pa - pb;
                                return new Date(a.created_at || 0) - new Date(b.created_at || 0);
                            });

                        console.log('[member] team=', team.id, 'taskCount=', teamTasks.length,
                            (d.tasks || []).map(t => ({ id: t.id, subTeam: t.assigned_sub_team_id, status: t.status, priority: t.priority })));

                        if (teamTasks.length === 0) {
                            taskEl.innerHTML = '<p class="standby">No task assigned yet — stand by.</p>';
                        } else {
                            const hdr = teamTasks.length > 1
                                ? `<div class="tasks-count-header">📋 ${teamTasks.length} Tasks</div>`
                                : '';
                            taskEl.innerHTML = hdr + teamTasks.map(renderTaskItem).join('');
                        }
                    } else {
                        console.warn('[member] sub-team not found. teamID=', teamID,
                            'sub_teams=', (d.sub_teams || []).map(t => t.id));
                    }
                } else {
                    teamEl.innerHTML = '<span class="team-badge none">Not yet assigned to a team</span>';
                    taskEl.innerHTML = '';
                }
            }

            // ── My Reports ────────────────────────────────────────────────────
            // Always refresh reports regardless of whether member was found in server list.
            // After a server restart, the member record is wiped but reports submitted
            // during that session are also wiped, so this is a no-op. For active sessions
            // this ensures replies appear on the next poll.
            const myReports = (d.reports || [])
                .filter(r => r.reported_by && memberID &&
                             r.reported_by.toLowerCase() === memberID.toLowerCase())
                .sort((a, b) => new Date(b.reported_at) - new Date(a.reported_at))
                .slice(0, 5);

            const reportsEl = document.getElementById('homeReports');
            if (myReports.length === 0) {
                reportsEl.innerHTML = '';
            } else {
                const statusMap = {
                    'New':       { label: 'Submitted — waiting', cls: 'status-waiting' },
                    'Assigned':  { label: 'Acknowledged ✓',      cls: 'status-acknowledged' },
                    'Resolved':  { label: 'Resolved ✓',          cls: 'status-resolved' },
                    'Escalated': { label: 'Escalated 🚨',         cls: 'status-escalated' }
                };
                reportsEl.innerHTML =
                    `<div class="my-reports-title">My Reports (${myReports.length})</div>` +
                    myReports.map(r => {
                        const s = statusMap[r.status] || { label: r.status, cls: 'status-waiting' };
                        const addr = r.location?.address
                            ? `<div class="report-row-addr">${esc(r.location.address)}</div>`
                            : '';
                        const subject = r.subject
                            ? `<div class="report-row-addr" style="font-style:normal;color:#555;">${esc(r.subject)}</div>`
                            : '';
                        const reply = r.reply_text
                            ? `<div style="margin-top:6px;padding:7px 10px;background:#e8f4e8;border-left:3px solid #34C759;border-radius:6px;font-size:12px;color:#1c4a1c;">
                                   <span style="font-weight:700;text-transform:uppercase;font-size:10px;color:#34C759;letter-spacing:0.4px;">Reply from Team Leader</span>
                                   <div style="margin-top:2px;">${esc(r.reply_text)}</div>
                               </div>`
                            : '';
                        return `<div class="report-row" style="flex-direction:column;align-items:stretch;gap:4px;">
                            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                                <div>
                                    <div class="report-row-title">${esc(r.type)}</div>
                                    ${subject}${addr}
                                </div>
                                <div class="report-row-status ${s.cls}" style="flex-shrink:0;">${s.label}</div>
                            </div>
                            ${reply}
                        </div>`;
                    }).join('');
            }
        } catch (e) {
            // Silent fail — server might be temporarily unreachable
        }
    }

    // ── Name edit ──────────────────────────────────────────────────────────────
    function editNameMode() {
        document.getElementById('nameDisplayRow').style.display = 'none';
        document.getElementById('nameEditRow').style.display = 'block';
        const input = document.getElementById('nameEditInput');
        input.value = memberName;
        input.focus();
        input.select();
    }

    function cancelNameEdit() {
        document.getElementById('nameDisplayRow').style.display = 'flex';
        document.getElementById('nameEditRow').style.display = 'none';
    }

    async function saveName() {
        const newName = document.getElementById('nameEditInput').value.trim();
        if (!newName) { toast('Name cannot be empty'); return; }
        if (newName === memberName) { cancelNameEdit(); return; }
        try {
            await api('PATCH', `/api/members/${memberID}/name`, { name: newName });
            memberName = newName;
            localStorage.setItem('cert_mname', memberName);
            document.getElementById('homeNameText').textContent = memberName;
            cancelNameEdit();
            toast('Name updated ✓');
        } catch (e) {
            toast(e.status === 401 ? 'Incorrect PIN' : 'Failed to update — check connection');
        }
    }

    function renderTaskItem(task) {
        const pKey = (task.priority || 'Medium').toLowerCase();
        const pClass = `p-${pKey}`;
        const notesHtml = task.notes
            ? `<div class="task-notes-log" id="taskNotes-${task.id}">${esc(task.notes)}</div>`
            : `<div class="task-notes-log" id="taskNotes-${task.id}" style="display:none;"></div>`;
        return `<div class="task-box ${pClass}" id="taskCard-${task.id}">
            <div class="task-priority-row">
                <span class="task-label ${pClass}">${esc(task.priority)}</span>
            </div>
            <div class="task-title">${esc(task.title)}</div>
            ${task.description ? `<div class="task-desc">${esc(task.description)}</div>` : ''}
            ${notesHtml}
            <div class="task-comment-row">
                <textarea class="task-comment-input" id="taskComment-${task.id}"
                    placeholder="Add a comment…" rows="1"
                    oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addComment('${task.id}');}"></textarea>
                <button class="task-comment-btn" onclick="addComment('${task.id}')">Send</button>
            </div>
            <button class="task-complete-btn" onclick="completeTask('${task.id}')">✓ Mark as Completed</button>
        </div>`;
    }

    async function addComment(taskId) {
        const input = document.getElementById(`taskComment-${taskId}`);
        const text = input?.value.trim();
        if (!text) return;
        input.disabled = true;
        try {
            const updated = await api('POST', `/api/tasks/${taskId}/comment`,
                { text, author_name: memberName });
            input.value = '';
            input.style.height = 'auto';
            const log = document.getElementById(`taskNotes-${taskId}`);
            if (log) {
                log.textContent = updated.notes;
                log.style.display = '';
                log.scrollTop = log.scrollHeight;
            }
            toast('Comment added ✓');
        } catch (e) {
            toast('Failed to add comment — check connection');
        } finally {
            if (input) input.disabled = false;
        }
    }

    async function completeTask(taskId) {
        if (!confirm('Mark this task as completed?')) return;
        try {
            await api('POST', `/api/tasks/${taskId}/complete`, {});
            document.getElementById(`taskCard-${taskId}`)?.remove();
            const taskEl = document.getElementById('homeTask');
            if (taskEl && !taskEl.querySelector('.task-box')) {
                taskEl.innerHTML = '<p class="standby">All tasks completed — well done!</p>';
            }
            toast('Task marked as completed ✓');
        } catch (e) {
            toast('Failed to complete task — check connection');
        }
    }

    function scheduleRefresh() {
        refreshAssignment();
        refreshTimer = setInterval(refreshAssignment, 10000);
    }

    // ── Severity ───────────────────────────────────────────────────────────────
    function setSev(val) { severity = val; renderSev(); }
    function renderSev() {
        const map = { Low: 'sLow', Medium: 'sMed', High: 'sHigh', 'Life Safety': 'sCrit' };
        Object.entries(map).forEach(([v, id]) =>
            document.getElementById(id).classList.toggle('sel', v === severity));
    }

    // ── GPS (optional — fails silently on plain HTTP on iOS) ──────────────────
    function tryGPS() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
            pos => { gps = { lat: pos.coords.latitude, lng: pos.coords.longitude }; },
            () => {}
        );
    }

    // ── Report submission ──────────────────────────────────────────────────────
    async function submitReport() {
        if (!memberID) { toast('Not checked in'); return; }

        const address = document.getElementById('rAddress').value.trim();
        const notes   = document.getElementById('rNotes').value.trim();
        const now = isoNow();

        const subject = document.getElementById('rSubject').value.trim();
        const payload = {
            type:          document.getElementById('rType').value,
            subject:       subject || null,
            severity:      severity,
            status:        'New',
            notes:         notes,
            reported_by:   memberID,
            to_name:       'Team Leader',
            reported_at:   now,
            last_updated:  now,
            location: {
                latitude:  gps ? gps.lat : 0,
                longitude: gps ? gps.lng : 0,
                address:   address || null,
                timestamp: now
            }
        };

        try {
            await api('POST', '/api/reports', payload);
            reportCount++;
            localStorage.setItem('cert_rcount', String(reportCount));
            updateSessionNote();
            toast('Report submitted ✓');
            showScreen('homeScreen');
        } catch (e) {
            toast(e.status === 401 ? 'Incorrect PIN — ask your team leader' : 'Failed to submit — check WiFi');
        }
    }

    // ── Utilities ──────────────────────────────────────────────────────────────
    // ISO timestamp without milliseconds (Swift's iso8601 decoder rejects .000Z)
    function isoNow() {
        return new Date().toISOString().replace(/\.\d{3}Z$/, 'Z');
    }

    async function api(method, path, body) {
        const opts = {
            method,
            headers: {
                'Content-Type': 'application/json',
                'X-CERT-Token': localStorage.getItem('cert_team_pin') || ''
            }
        };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(path, opts);
        if (!res.ok) {
            const err = new Error(await res.text());
            err.status = res.status;
            throw err;
        }
        const text = await res.text();
        return text ? JSON.parse(text) : null;
    }

    function esc(s) {
        return String(s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function updateSessionNote() {
        document.getElementById('sessionNote').textContent =
            reportCount ? `${reportCount} report${reportCount > 1 ? 's' : ''} submitted this session` : '';
    }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2500);
    }

    // Render default severity on page load
    renderSev();
</script>
