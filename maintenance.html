<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CERT Assist — Maintenance</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0f1e;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .card {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .badge {
    display: inline-block;
    border: 3px solid #39b54a;
    border-radius: 14px;
    padding: 20px 36px;
    margin-bottom: 36px;
  }

  .badge .cert {
    font-family: Impact, "Arial Narrow", Arial, sans-serif;
    font-size: 64px;
    color: #39b54a;
    line-height: 1;
    letter-spacing: 2px;
  }

  .badge .assist {
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 4px;
    margin-top: 6px;
  }

  .badge .divider {
    height: 2px;
    background: #39b54a;
    margin: 8px 0;
    border-radius: 1px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 14px;
  }

  p {
    font-size: 16px;
    color: #9ba8c0;
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .timer {
    margin-top: 32px;
    font-size: 14px;
    color: #39b54a;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .footer {
    margin-top: 48px;
    font-size: 12px;
    color: #4a5568;
  }
</style>
</head>
<body>
<div class="card">

  <div class="badge">
    <div class="cert">CERT</div>
    <div class="divider"></div>
    <div class="assist">ASSIST</div>
  </div>

  <h1>We'll Be Right Back</h1>
  <p>The CERT Assist server is temporarily down for maintenance.</p>
  <p>Please try again in about <strong style="color:#fff">15 minutes</strong>.</p>

  <div class="timer">🛠 Maintenance in progress</div>

  <div class="footer">Community Emergency Response Team · certassist.us</div>
</div>
</body>
</html>
