# nginx config for certcommand.org
#
# Maintenance page: /var/www/html/maintenance.html
# Deploy: sudo cp nginx/maintenance.html /var/www/html/

# Rate limit: 60 requests/min per IP to API endpoints, burst of 20
# fail2ban handles brute force blocking after 2 wrong PINs
limit_req_zone $binary_remote_addr zone=pin_limit:10m rate=60r/m;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Security headers — applied to all server blocks
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Content-Security-Policy "frame-ancestors 'self'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

ssl_certificate     /etc/letsencrypt/live/certcommand.org/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/certcommand.org/privkey.pem;
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         HIGH:!aNULL:!MD5;
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 10m;

# ─── County ───────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name county.certcommand.org;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name county.certcommand.org;
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /var/www/html;
        internal;
    }
    location ~* \.(md)$ { return 404; }
    location = / {
        default_type text/html;
        return 200 '<html><head><title>Field Operations</title><style>body{margin:0;background:#f4f4f4;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif}p{color:#aaa;font-size:14px}</style></head><body><p>This site is not publicly available.</p></body></html>';
    }
    location = /ws {
        proxy_pass         http://127.0.0.1:8090;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    location /api/ {
        limit_req zone=pin_limit burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }
    location / {
        proxy_pass         http://127.0.0.1:8090;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }
}

